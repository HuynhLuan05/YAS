apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.initScript.name }}
data:
  init-db.sh: |
    {{- .Values.initScript.content | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      nodePort: {{ .Values.service.nodePort }}
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      annotations:
        traffic.sidecar.istio.io/excludeInboundPorts: "5432"
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
          {{- range $key, $val := .Values.env }}
          - name: {{ $key }}
            value: {{ $val | quote }}
          {{- end }}
          volumeMounts:
            - mountPath: {{ .Values.persistence.mountPath }}
              name: postgredb
            - mountPath: /docker-entrypoint-initdb.d/init-db.sh
              subPath: init-db.sh
              name: postgres-init-script
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            exec:
              command:
              - pg_isready
              - -U
              - {{ .Values.env.POSTGRES_USER }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: postgredb
          persistentVolumeClaim:
            claimName: postgres-storage
        - name: postgres-init-script
          configMap:
            name: {{ .Values.initScript.name }}
            defaultMode: 0755
