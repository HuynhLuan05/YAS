# Optional: dedicated ServiceAccount for Jenkins CD when using kubeconfig credential (Option C).
# Apply with cluster-admin (or someone who can create Role/RoleBinding in yas + SA in jenkins).
#
# After apply:
#   kubectl create token jenkins-cd -n jenkins --duration=8760h
# Then build a kubeconfig (see jenkins/README-CD.md — Option C) with that token and API server URL.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-cd
  namespace: jenkins
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-cd-yas-deploy
  namespace: yas
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-cd-yas-deploy
  namespace: yas
subjects:
  - kind: ServiceAccount
    name: jenkins-cd
    namespace: jenkins
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-cd-yas-deploy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-cd-nodes-read
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-cd-nodes-read
subjects:
  - kind: ServiceAccount
    name: jenkins-cd
    namespace: jenkins
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jenkins-cd-nodes-read
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-cd-ingress-svc-read
  namespace: ingress-nginx
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-cd-ingress-svc-read
  namespace: ingress-nginx
subjects:
  - kind: ServiceAccount
    name: jenkins-cd
    namespace: jenkins
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-cd-ingress-svc-read
